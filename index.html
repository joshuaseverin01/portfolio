<head>

<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Joshua Severin — Operator at the intersection of energy markets and product</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #12100d;
  --ink-2: #2a251e;
  --muted: #685f54;
  --muted-2: #958d82;
  --line: #ddd4c5;
  --line-2: #cdc2b1;
  --paper: #f4ede2;
  --paper-2: #ebe1d2;
  --paper-3: #dfd4c2;
  --card: #faf4ea;
  --accent: #1f3a31;
  --accent-2: #2f5f49;
  --accent-soft: #d9e3da;
  --signal: #b85723;
  --case-bg: #161311;
  --case-card: rgba(245, 239, 229, 0.045);
  --case-line: rgba(245, 239, 229, 0.14);
  --case-text: rgba(245, 239, 229, 0.96);
  --case-muted: rgba(245, 239, 229, 0.68);
  --case-soft: rgba(143, 187, 161, 0.14);
  --radius: 2px;
  --density: 1;
}

html[data-theme="dark"] {
  --ink: #ece9e2;
  --ink-2: #d5d0c5;
  --muted: #8c8478;
  --muted-2: #605b52;
  --line: #26231f;
  --line-2: #36322c;
  --paper: #121110;
  --paper-2: #171513;
  --card: #1c1a17;
  --accent: #94bca4;
  --accent-2: #bad8c5;
  --accent-soft: #202a23;
  --signal: #e8895b;
  --case-bg: #0f0d0b;
  --case-card: rgba(255, 255, 255, 0.045);
  --case-line: rgba(255, 255, 255, 0.12);
  --case-text: rgba(244, 239, 229, 0.96);
  --case-muted: rgba(244, 239, 229, 0.68);
  --case-soft: rgba(148, 188, 164, 0.16);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-size: 15.5px;
  line-height: 1.58;
  font-feature-settings: "ss01","cv11","cv02";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  background-image:
    linear-gradient(180deg, color-mix(in oklab, var(--paper-2) 56%, var(--paper)) 0%, var(--paper) 220px),
    linear-gradient(180deg, transparent 0%, transparent 100%);
}

.serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
.mono  { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-feature-settings: "ss01","ss02","ss03"; }

a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

.container {
  max-width: 1260px;
  margin: 0 auto;
  padding: 0 calc(34px * var(--density));
}

.hairline { background: var(--line); height: 1px; width: 100%; }

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--muted);
}

/* selection */
::selection { background: var(--accent); color: var(--paper); }

/* subtle page grain */
body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: radial-gradient(rgba(20,19,17,0.035) 1px, transparent 1px);
  background-size: 3px 3px;
  z-index: 1;
  mix-blend-mode: multiply;
  opacity: 0.42;
}
html[data-theme="dark"] body::before {
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  mix-blend-mode: screen;
}

/* reveal-on-scroll */
.reveal { opacity: 0; transform: translateY(14px); transition: opacity .8s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
.reveal.is-in { opacity: 1; transform: none; }
html[data-motion="0"] .reveal { opacity: 1; transform: none; transition: none; }

/* dividers */
.rule {
  display:flex; align-items:baseline; gap: 16px;
  padding: 32px 0 20px;
  border-top: 1px solid var(--line);
}
.rule .num { color: var(--muted-2); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .1em; }
.rule .tag { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .14em; }

/* buttons */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 20px;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  font-size: 11px; letter-spacing: .14em;
  line-height: 1;
  text-transform: uppercase;
  border-radius: 999px;
  transition: transform .25s ease, background .25s ease, color .25s ease, box-shadow .25s ease;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 16px 30px rgba(20,19,17,0.12); }
.btn.ghost { background: color-mix(in oklab, var(--paper) 92%, transparent); color: var(--ink); border-color: var(--ink); }
.btn.ghost:hover { background: var(--ink); color: var(--paper); }

/* cursor dot */
.cursor-dot {
  position: fixed; z-index: 60;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  pointer-events: none;
  transform: translate(-50%,-50%);
  transition: transform .12s ease-out, width .2s ease, height .2s ease, opacity .25s ease;
  mix-blend-mode: multiply;
  opacity: 0;
}
html[data-theme="dark"] .cursor-dot { mix-blend-mode: screen; }
@media (hover: none) { .cursor-dot { display: none; } }

/* Tweaks panel */
.tweaks-panel {
  position: fixed; right: 20px; bottom: 20px; z-index: 80;
  width: 300px;
  background: var(--card);
  border: 1px solid var(--line-2);
  padding: 18px 18px 16px;
  font-size: 12px;
  transform: translateY(20px); opacity: 0; pointer-events: none;
  transition: transform .3s ease, opacity .3s ease;
  box-shadow: 0 24px 48px -20px rgba(0,0,0,0.18);
}
.tweaks-panel.open { transform: none; opacity: 1; pointer-events: auto; }
.tweaks-panel h4 {
  margin: 0 0 14px; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
  display:flex; justify-content: space-between; align-items:center;
}
.tweak-row { padding: 8px 0; border-top: 1px dashed var(--line); }
.tweak-row:first-of-type { border-top: 0; }
.tweak-row label { display:block; color: var(--muted); margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; }
.swatches { display:flex; gap:8px; }
.swatch { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--line-2); cursor: pointer; }
.swatch.on { outline: 1px solid var(--ink); outline-offset: 2px; }
.seg { display:flex; }
.seg button { flex: 1; padding: 6px 8px; border: 1px solid var(--line-2); font-size: 11px; background: transparent; color: var(--ink); }
.seg button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.seg button + button { border-left: 0; }

/* ===== Mobile responsive fixes ===== */
@media (max-width: 780px) {
  .container { padding: 0 20px; }
  html { -webkit-text-size-adjust: 100%; }
  body { overflow-x: hidden; }

  /* kill any inline hard-coded widths that overflow viewport */
  .container [style*="width: 1100"],
  .container [style*="width: 1000"],
  .container [style*="width: 840"],
  .container [style*="width: 800"],
  .container [style*="width: 700"],
  .container [style*="width: 600"],
  .container [style*="width: 480"],
  .container [style*="maxWidth: 1100"],
  .container [style*="maxWidth: 1000"],
  .container [style*="max-width: 1100"],
  .container [style*="max-width: 1000"] {
    width: 100% !important;
    max-width: 100% !important;
  }

  /* hero */
  .hero-h1 { font-size: 36px !important; line-height: 1.04 !important; }
  .hero-sub { font-size: 15.5px !important; }

  /* about subtitle */
  .about-sub { font-size: 18px !important; }

  /* nav — collapse to just logo + status on mobile */
  nav .nav-links { display: none !important; }

  /* section headers: stack title + lede */
  .sh-grid { grid-template-columns: 1fr !important; gap: 12px !important; }

  /* section padding tighter */
  section { padding-left: 0; padding-right: 0; }

  /* experience rows collapse */
  .exp-row { grid-template-columns: 1fr !important; gap: 18px !important; }

  /* about two-col to one */
  .about-grid { grid-template-columns: 1fr !important; gap: 32px !important; }

  /* writing + principles + contact: single column */
  #writing .reveal, #thinking .reveal, .contact-grid { grid-template-columns: 1fr !important; }
  .contact-grid > div:last-child { text-align: left !important; }

  /* projects: collapse the mid client column */
  .project-row { grid-template-columns: 30px 1fr 28px !important; }
  .project-row > .project-client { display: none !important; }
  .detail-grid { grid-template-columns: 1fr !important; }

  /* skills/toolkit — single column */
  .toolkit-grid { grid-template-columns: 1fr !important; }
  .toolkit-grid > div { border-left: 0 !important; }
  .toolkit-grid > div + div { border-top: 1px solid var(--line) !important; }

  /* zonal viz */
  .zonal-grid { grid-template-columns: 1fr !important; }

  /* hide custom cursor on touch */
  .cursor-dot { display: none !important; }

  /* tweaks panel fit */
  .tweaks-panel { width: calc(100vw - 24px) !important; right: 12px !important; left: 12px !important; max-width: none !important; }
}

@media (max-width: 420px) {
  .container { padding: 0 16px; }
  .hero-h1 { font-size: 30px !important; }
  .about-sub { font-size: 16px !important; }
}

</style>
</head>
