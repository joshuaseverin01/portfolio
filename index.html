<style>
:root {
  --ink: #141311;
  --ink-2: #2a2722;
  --muted: #6b665d;
  --muted-2: #a19b90;
  --line: #e6e1d7;
  --line-2: #d6d0c3;
  --paper: #f4efe5;
  --paper-2: #ebe5d8;
  --card: #faf6ec;
  --accent: #1f3a2e;
  --accent-2: #2f6f4e;
  --accent-soft: #d9e6db;
  --signal: #c2410c;
  --radius: 2px;
  --density: 1;
}

html[data-theme="dark"] {
  --ink: #eceae4;
  --ink-2: #d4d1c7;
  --muted: #8c8579;
  --muted-2: #5f5a50;
  --line: #26241f;
  --line-2: #34312b;
  --paper: #121110;
  --paper-2: #171614;
  --card: #1b1a17;
  --accent: #8fbba1;
  --accent-2: #b1d4bd;
  --accent-soft: #1e2a23;
  --signal: #e8895b;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  font-feature-settings: "ss01","cv11","cv02";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

.serif { font-family: 'Instrument Serif', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.01em; }
.mono  { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-feature-settings: "ss01","ss02","ss03"; }

a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 calc(32px * var(--density));
}

.hairline { background: var(--line); height: 1px; width: 100%; }

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--muted);
}

::selection { background: var(--accent); color: var(--paper); }

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: radial-gradient(rgba(20,19,17,0.035) 1px, transparent 1px);
  background-size: 3px 3px;
  z-index: 1;
  mix-blend-mode: multiply;
  opacity: 0.6;
}
html[data-theme="dark"] body::before {
  background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
  mix-blend-mode: screen;
}

.reveal { opacity: 0; transform: translateY(14px); transition: opacity .8s ease, transform .9s cubic-bezier(.2,.7,.2,1); }
.reveal.is-in { opacity: 1; transform: none; }
html[data-motion="0"] .reveal { opacity: 1; transform: none; transition: none; }

.rule {
  display:flex; align-items:baseline; gap: 16px;
  padding: 24px 0 16px;
  border-top: 1px solid var(--line);
}
.rule .num { color: var(--muted-2); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .1em; }
.rule .tag { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .14em; }

.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 18px;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
  font-size: 13px; letter-spacing: .02em;
  transition: transform .25s ease, background .25s ease, color .25s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn.ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn.ghost:hover { background: var(--ink); color: var(--paper); }

.cursor-dot {
  position: fixed; z-index: 60;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  pointer-events: none;
  transform: translate(-50%,-50%);
  transition: transform .12s ease-out, width .2s ease, height .2s ease, opacity .25s ease;
  mix-blend-mode: multiply;
  opacity: 0;
}
html[data-theme="dark"] .cursor-dot { mix-blend-mode: screen; }
@media (hover: none) { .cursor-dot { display: none; } }

/* Theme toggle button */
.theme-toggle {
  width: 32px; height: 32px;
  border: 1px solid var(--line-2);
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  cursor: pointer;
  transition: border-color .2s ease, background .2s ease;
  background: transparent;
  color: var(--muted);
}
.theme-toggle:hover { border-color: var(--ink); color: var(--ink); }
</style>
